# docker-stack.yml
# Deploy: docker stack deploy -c docker-stack.yml pacoticket-site
version: "3.8"

services:
  web:
    image: ghcr.io/SEU_USUARIO/pacoticket-site:latest
    # ou build local: image: pacoticket-site:latest
    environment:
      DATABASE_URL: "postgresql://pacoticket:${POSTGRES_PASSWORD}@postgres:5432/pacoticket_site"
      NEXTAUTH_SECRET: "${NEXTAUTH_SECRET}"
      NEXTAUTH_URL: "https://pacoticket.com.br"
      ADMIN_EMAIL: "${ADMIN_EMAIL}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD}"
      NODE_ENV: "production"
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.pacoticket.rule=Host(`pacoticket.com.br`) || Host(`www.pacoticket.com.br`)"
        - "traefik.http.routers.pacoticket.entrypoints=websecure"
        - "traefik.http.routers.pacoticket.tls.certresolver=letsencrypt"
        - "traefik.http.services.pacoticket.loadbalancer.server.port=3000"
        # Redirect www → apex
        - "traefik.http.middlewares.www-redirect.redirectregex.regex=^https://www\\.pacoticket\\.com\\.br/(.*)"
        - "traefik.http.middlewares.www-redirect.redirectregex.replacement=https://pacoticket.com.br/$${1}"
        - "traefik.http.routers.pacoticket.middlewares=www-redirect"
    networks:
      - traefik-public
      - pacoticket-internal

  # Opcional: rodar migrations automaticamente no deploy
  # Se preferir rodar manualmente, remova este serviço
  migrate:
    image: ghcr.io/SEU_USUARIO/pacoticket-site:latest
    command: sh -c "npx prisma db push && npx tsx prisma/seed.ts"
    environment:
      DATABASE_URL: "postgresql://pacoticket:${POSTGRES_PASSWORD}@postgres:5432/pacoticket_site"
      ADMIN_EMAIL: "${ADMIN_EMAIL}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD}"
    deploy:
      replicas: 1
      restart_policy:
        condition: none
    networks:
      - pacoticket-internal

networks:
  traefik-public:
    external: true
  pacoticket-internal:
    driver: overlay
