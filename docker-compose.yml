version: "3.9"

# docker-compose.yml — Desenvolvimento local
#
# Uso:
#   docker compose up -d                     # sobe Postgres + app (hot-reload)
#   docker compose up                        # sobe com logs no terminal
#   docker compose --profile tools up -d    # inclui pgAdmin (porta 5050)
#   docker compose down                      # para e remove containers
#   docker compose down -v                   # apaga também os volumes (reseta banco)
#   docker compose logs -f pacoticket_web    # acompanhar logs da app

services:

  # ── PostgreSQL local ───────────────────────────────────────────────────────
  pacoticket_db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: pacoticket
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: pacoticket_site
    volumes:
      - pacoticket_db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pacoticket -d pacoticket_site"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Next.js (hot-reload) ───────────────────────────────────────────────────
  pacoticket_web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    depends_on:
      pacoticket_db:
        condition: service_healthy
    environment:
      NODE_ENV: "development"
      DATABASE_URL: "postgresql://pacoticket:devpassword@pacoticket_db:5432/pacoticket_site"
      NEXTAUTH_SECRET: "dev-secret-nao-usar-em-producao"
      NEXTAUTH_URL: "http://localhost:3000"
      ADMIN_EMAIL: "admin@pacoticket.local"
      ADMIN_PASSWORD: "admin123"
      R2_ACCOUNT_ID: ""
      R2_ACCESS_KEY_ID: ""
      R2_SECRET_ACCESS_KEY: ""
      R2_BUCKET_NAME: ""
      R2_PUBLIC_URL: ""
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    command: >
      sh -c "
        npx prisma db push --skip-generate &&
        npx tsx prisma/seed.ts &&
        npm run dev
      "

  # ── pgAdmin — interface web para o banco (opcional) ────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    restart: unless-stopped
    profiles: ["tools"]
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@pacoticket.local
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    volumes:
      - pacoticket_pgadmin_data:/var/lib/pgadmin
    depends_on:
      - pacoticket_db

volumes:
  pacoticket_db_data:
    name: pacoticket_db_data
  pacoticket_pgadmin_data:
    name: pacoticket_pgadmin_data
